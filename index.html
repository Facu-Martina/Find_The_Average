<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Average</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            align-items: center;

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

            font-family: "Segoe UI", sans-serif;

            color: white;
        }

        #titulo {
            margin-top: 50px;

            font-size: 4rem;

            font-weight: 800;

            letter-spacing: 3px;

            text-transform: uppercase;

            color: white;

            text-shadow:
                0 0 10px rgba(255,255,255,0.2),
                0 0 25px rgba(255,255,255,0.1);
        }

        #linea {
            position: relative;

            width: 80vw;
            max-width: 1200px;

            height: 180px;

            margin-top: 80px;

            border: 3px solid rgba(255,255,255,0.2);

            border-radius: 20px;

            background: rgba(255,255,255,0.05);

            backdrop-filter: blur(10px);

            box-shadow:
                0 15px 40px rgba(0,0,0,0.35),
                inset 0 0 20px rgba(255,255,255,0.05);

            overflow: hidden;

            transition: 0.3s;
        }

        #linea:hover {
            transform: translateY(-2px);

            box-shadow:
                0 20px 50px rgba(0,0,0,0.4),
                inset 0 0 20px rgba(255,255,255,0.08);
        }

        #playBtn {
            margin-top: 35px;

            padding: 16px 45px;

            font-size: 1.2rem;

            font-weight: 700;

            border: none;

            border-radius: 14px;

            color: white;

            background: linear-gradient(
                135deg,
                #22c55e,
                #16a34a
            );

            cursor: pointer;

            box-shadow:
                0 10px 25px rgba(34,197,94,0.35);

            transition: all 0.25s ease;
        }

        #playBtn:hover {
            transform: translateY(-3px) scale(1.03);

            box-shadow:
                0 15px 35px rgba(34,197,94,0.5);
        }

        #playBtn:active {
            transform: scale(0.98);
        }

        #resultado {
            margin-top: 25px;

            min-height: 50px;

            font-size: 2rem;

            font-weight: 800;

            letter-spacing: 1px;

            text-shadow:
                0 0 10px rgba(255,255,255,0.2);
        }

        #resultado:not(:empty) {
            padding: 15px 30px;

            border-radius: 15px;

            background: rgba(255,255,255,0.08);

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);
        }
        #bestScore {
            margin-top: 10px;

            font-size: 1.3rem;

            color: rgba(255,255,255,0.75);

            font-weight: 600;
        }
        @keyframes parpadeo {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }

            80% {
                opacity: 1;
            }

        }

        .blink {

            animation: parpadeo 0.8s linear 6;

        }
    </style>
</head>
<body>
    <h1 id="titulo">Find The Average</h1>
    <div id="linea"></div>
    <button id="playBtn">New Round</button>
    <p id="resultado"></p>
    <p id="bestScore"></p>

    <script>
        const linea = document.getElementById("linea");
        const playBtn = document.getElementById("playBtn");
        const resultado = document.getElementById("resultado")
        const bestScore = document.getElementById("bestScore");
        const sonidoRecord = new Audio("game_success_alert.mp3");
        sonidoRecord.volume = 0.4;

        let record = 0;

        function iniciarRonda() {

            playBtn.style.display = "none";

            linea.onclick = null;

            resultado.textContent = "";

            linea.innerHTML = "";

            const puntos = [];

            for (let i = 0; i < 10; i++) {
                puntos.push(Math.random() * 100);
            }

            const anchoLinea = linea.offsetWidth;

            puntos.forEach(valor => {

                const xPantalla =
                    (valor / 100) * (anchoLinea - 10);

                const punto = document.createElement("div");

                punto.style.position = "absolute";
                punto.style.left = `${xPantalla}px`;

                punto.style.top = "50%";
                punto.style.transform = "translateY(-50%)";

                punto.style.width = "10px";
                punto.style.height = "10px";

                punto.style.borderRadius = "50%";
                punto.style.backgroundColor = "white";

                linea.appendChild(punto);
            });

            const promedio =
                puntos.reduce((a, b) => a + b, 0) / puntos.length;

            linea.onclick = (e) => {

                linea.onclick = null;

                const rect = linea.getBoundingClientRect();

                const clickX = e.clientX - rect.left;

                const clickValor =
                    (clickX / anchoLinea) * 100;

                const promedioPantalla =
                    (promedio / 100) * (anchoLinea - 10);

                const errorPx =
                    Math.abs(clickX - promedioPantalla);

                const porcentaje =
                    Math.round(
                        Math.max(
                            0,
                            100 - Math.pow(errorPx / 3, 1.5)
                        )
                    );

                linea.innerHTML = "";

                const lineaUsuario =
                    document.createElement("div");

                lineaUsuario.style.position = "absolute";
                lineaUsuario.style.left = `${clickX}px`;
                lineaUsuario.style.top = "0";
                lineaUsuario.style.width = "3px";
                lineaUsuario.style.height = "100%";
                lineaUsuario.style.backgroundColor = "#3b82f6";

                linea.appendChild(lineaUsuario);

                const lineaPromedio =
                    document.createElement("div");

                lineaPromedio.style.position = "absolute";
                lineaPromedio.style.left =
                    `${promedioPantalla}px`;

                lineaPromedio.style.top = "0";
                lineaPromedio.style.width = "3px";
                lineaPromedio.style.height = "100%";
                lineaPromedio.style.backgroundColor = "#ef4444";

                linea.appendChild(lineaPromedio);

                const hue = porcentaje * 1.2;

                resultado.style.color =
                    `hsl(${hue}, 100%, 50%)`;

                resultado.style.textShadow =
                    `0 0 15px hsl(${hue}, 100%, 50%)`;

                if (porcentaje > record) {

                    record = porcentaje;

                    sonidoRecord.currentTime = 0;
                    sonidoRecord.play().catch(e => console.log("Audio bloqueado:", e));

                    resultado.textContent =
                        `🏆 NEW BEST SCORE • ${porcentaje.toFixed(1)}%`;

                    bestScore.textContent =
                        `Best Score: ${record.toFixed(1)}%`;

                    resultado.classList.add("blink");

                    setTimeout(() => {
                        resultado.classList.remove("blink");
                    }, 2500);

                }
                else {

                    resultado.textContent =
                        `Accuracy: ${porcentaje.toFixed(1)}%`;

                    bestScore.textContent =
                        `Best Score: ${record.toFixed(1)}%`;
                }

                resultado.style.textShadow =
                    `0 0 15px hsl(${hue}, 100%, 50%)`;

                playBtn.style.display = "block";
            };
        }

        playBtn.addEventListener("click", () => {
            iniciarRonda();
        });

        playBtn.style.display = "block";

        linea.onclick = null;

    </script>
</body>
</html>
